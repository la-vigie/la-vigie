# La Vigie MCP server (TASK-193). Codex reads the bearer token from the env
# var named below — it has no static-header auth for HTTP MCP — so La Vigie
# sets LAVIGIE_MCP_TOKEN in the agent's spawn environment. Generated by
# scripts/generate-skills.mjs; do not edit by hand.
[mcp_servers.lavigie]
url = "http://127.0.0.1:__LAVIGIE_MCP_PORT__/mcp"
bearer_token_env_var = "LAVIGIE_MCP_TOKEN"
